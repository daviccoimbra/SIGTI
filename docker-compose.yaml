version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: sigti_postgres
    restart: always
    environment:
      POSTGRES_USER: sigti
      POSTGRES_PASSWORD: sigti123
      POSTGRES_DB: sigti_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: